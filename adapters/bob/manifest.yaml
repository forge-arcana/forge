tool: bob
schema_version: 1

deploy:
  skills_target:    ~/.bob/skills
  commands_target:  ~/.bob/commands               # Bob has dedicated /commands files
  rules_target:     ~/.bob/rules                  # directory, not single file
  scripts_target:   ~/.bob/scripts                # convention; Bob has no fixed location
  memory_target:    null                          # TBD during Phase 3 investigation
  learnings_target: ~/.bob/rules/learnings        # piggyback on rules dir until Bob has a memory primitive

# Bob's documented frontmatter is just `name` and `description` — both already in core's required set.
# Nothing extra to inject.
frontmatter_inject: {}

# Bob has no documented model-pinning per skill (yet). The `<!-- model: X -->` hint is dropped.
# Skills that NEED a deep model can declare it via Bob's per-mode model selection — investigate.
skill_overrides: {}

# Replicate the global rules content as AGENTS.md at project roots too.
# Bob auto-loads AGENTS.md by default — this becomes the cross-tool bridge.
extra_outputs:
  - source: core/rules
    destination: AGENTS.md                        # concatenated, written at project root
    scope: per-project

# Slash commands — generate one .md per art under commands_target, with `argument-hint`
# frontmatter when the art accepts $ARGUMENTS.
slash_commands:
  generate_from_skills: true
  arg_hint_extraction: from_skill_body            # parse `## Arguments` section if present

prompt_primitive: inline_chat_prompt              # PHASE 3 INVESTIGATION
                                                  # Likely fallback: render a numbered list in chat,
                                                  # parse the user's reply. May be improved if Bob
                                                  # exposes a structured prompt API we haven't found.

bash_invocation: direct                           # `command` tool group must be enabled in mode

# Capabilities — populated during Phase 3 investigation.
hooks:
  enabled: false                                  # not documented; assume absent
  events: []

subagent_spawning:
  enabled: unknown                                # Bob has "Orchestrator mode" — verify whether it spawns
                                                  # parallel sub-agents the way Claude's Task tool does.
                                                  # If yes → wire smith/temper/pound/wedge to it.
                                                  # If no → those arts run sequentially on Bob.
  primitive: orchestrator_mode

mcp_server_registry: unknown                      # Bob supports MCP; registration mechanism TBD

# Bob has no Claude-style OAuth race. WA-001 is intentionally absent.
workarounds: {}

# Custom-mode YAML emission — Bob lets us scope tool permissions per mode.
# We can map each art to a mode with the minimal tool set it needs.
custom_modes:
  emit: true
  destination: ~/.bob/custom_modes.yaml
  one_mode_per_skill: true                        # arts get isolated permissions
