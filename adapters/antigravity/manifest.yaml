tool: antigravity
schema_version: 1
status: smoke-test  # Phase 3 acceptance test — /eli5 first

# Antigravity sits inside the Gemini ecosystem; its config root is ~/.gemini/.
# On Windows: %USERPROFILE%\.gemini\ (the user's Antigravity install runs on the
# Windows host, so emitted paths resolve there).
deploy:
  workflows_workspace_target: .agents/workflows         # relative to project root
  workflows_global_target:    ~/.gemini/antigravity/global_workflows
  rules_workspace_target:     .agents/rules
  rules_global_target:        ~/.gemini/GEMINI.md       # single file, not a dir
  agents_md_target:           AGENTS.md                  # cross-tool standard, project root
  scripts_target:             null                        # Antigravity has no documented scripts dir
  memory_target:              null                        # not yet investigated
  learnings_target:           null                        # not yet investigated

# Antigravity workflows accept a minimal frontmatter (name + description).
# The `name` field is optional — when absent, Antigravity uses the filename stem
# as the slash-command name. We emit `name` explicitly for clarity.
frontmatter_inject:
  # Empty — Antigravity workflow frontmatter is just `name` + `description`
  # which we already carry in core meta. Nothing extra to inject.

# No model overrides — Antigravity sessions pick the model (Gemini 3.1 Pro etc.)
# at the IDE level, not per skill. The HTML model comments we emit for Claude
# are not honored here.
skill_overrides: {}

# Forge skills become Antigravity workflows. Slash invocation maps directly:
# `/eli5` in Antigravity loads .agents/workflows/eli5.md and executes it.
# Workflows are EXPLICITLY invoked by slash — no auto-activation by description
# (unlike Claude Code or Bob).
slash_commands:
  workspace_dir: .agents/workflows
  filename_pattern: "{skill_name}.md"

prompt_primitive: inline_chat_prompt
# Antigravity has no documented mid-task structured prompt primitive. Multi-choice
# prompts fall back to numbered options in chat output; the agent parses the
# user's reply. The skill bodies already use harness-aware language for this.

bash_invocation: turbo_optional
# Bash steps in workflows ask permission per command UNLESS prefixed with `// turbo`.
# Forge runtime scripts (forge-status.sh, forge-scan.sh, etc.) would need turbo
# annotation if we want them to auto-run. Phase 3 investigation: decide which
# script invocations to mark turbo. For the /eli5 smoke test this is irrelevant
# (no shell calls).

# Capabilities Antigravity provides (or doesn't).
hooks:
  enabled: false   # no documented lifecycle hooks
  events: []

subagent_spawning:
  enabled: prose_only   # Agent Manager UI exists (Ctrl+E) but no programmatic
                         # API for workflows to spawn sub-agents. Workflows that
                         # need apprentices (smith, temper, pound, wedge) fall
                         # back to sequential execution per the graceful-
                         # degradation prose already in core skill bodies.
  primitive: agent_manager_ui

mcp_server_registry: unknown   # Antigravity supports MCP (per "@" mentions in
                                # chat) but registration mechanism is not in the
                                # docs we fetched. Phase 3 investigation.

# Antigravity uses the Gemini API, not the Anthropic SDK. WA-001 (the OAuth
# token-race workaround) does not apply — there is no race to work around.
workarounds: {}

# AGENTS.md emission: Antigravity auto-loads AGENTS.md from project root since
# v1.20.3. The build composes core/rules/ into AGENTS.md and drops it at root.
# Same file works for Bob too — the cross-tool standard is real.
agents_md:
  source: core/rules
  destination: AGENTS.md
  scope: project-root

# Smoke-test scope for Phase 3 entry: just /eli5.
# When the smoke test passes, the build emits ALL skills as workflows.
smoke_test:
  skills: [eli5]
  trigger_via: explicit_slash
  pass_criteria: |
    User types `/eli5 [something]` in Antigravity chat. Antigravity finds the
    workflow file in .agents/workflows/eli5.md, loads it, and produces an
    ELI5-style explanation.
