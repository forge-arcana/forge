tool: claude-code
schema_version: 1

deploy:
  skills_target:    ~/.claude/skills
  commands_target:  null                        # Claude Code uses skills, not separate /commands files
  rules_target:     ~/.claude/CLAUDE.md         # single-file global rules
  scripts_target:   ~/.claude/scripts           # tool-neutral scripts land here too
  memory_target:    ~/.claude/memory
  learnings_target: ~/.claude/learnings

# Extra frontmatter merged into every emitted SKILL.md.
# These are the Claude-Code-specific fields the schema deliberately keeps out of core/.
frontmatter_inject:
  user-invocable: true                          # required for slash-command discoverability

# Per-skill overrides. Anything not listed inherits frontmatter_inject only.
# `model_comment` becomes the `<!-- model: X -->` HTML comment after frontmatter.
skill_overrides:
  forge:    { model_comment: "sonnet | escalation: learning triage → spawn opus subagent" }
  smith:    { model_comment: "opus" }
  wedge:    { model_comment: "opus" }
  prime:    { model_comment: "opus" }
  probe:    { model_comment: "opus" }
  poke:     { model_comment: "opus" }
  preen:    { model_comment: "opus" }
  press:    { model_comment: "opus" }
  pound:    { model_comment: "opus" }
  pitch:    { model_comment: "opus" }
  pry:      { model_comment: "opus" }
  praise:   { model_comment: "opus" }
  temper:   { model_comment: "opus" }
  cicd:     { model_comment: "sonnet" }
  qt:       { model_comment: "haiku" }
  srs:      { model_comment: "haiku" }
  monci:    { model_comment: "haiku" }
  ponci:    { model_comment: "haiku" }
  vsix:     { model_comment: "haiku" }
  eli5:     { model_comment: "haiku" }
  wawa:     { model_comment: "haiku" }
  wrap:     { model_comment: "haiku" }
  # `dig` deliberately has no model comment (current state had no frontmatter at all)

prompt_primitive: AskUserQuestion

bash_invocation: direct                         # `Bash` tool runs scripts directly

# Capabilities Claude Code provides that other adapters may lack.
hooks:
  enabled: true
  events: [SessionStart, Stop, UserPromptSubmit, PreToolUse, PostToolUse]

subagent_spawning:
  enabled: true
  primitive: Task                               # the `Task`/`Agent` tool

memory_dir: ~/.claude/projects/<project-slug>/memory

mcp_server_registry: ~/.claude/settings.json    # `mcpServers` key

# Claude-specific workarounds the adapter owns. These DO NOT exist in core/.
workarounds:
  WA-001:
    name: OAuth token race protection
    layer_1_scripts:
      - adapters/claude-code/scripts/agent-token-warmup.sh
      - adapters/claude-code/scripts/agent-preflight.sh
      - adapters/claude-code/scripts/user-agent-preflight.sh
    layer_2_hook:
      script: adapters/claude-code/scripts/agent-token-scheduler.sh
      installer: adapters/claude-code/scripts/install-token-hook.sh
      event: SessionStart
    sync_helper: adapters/claude-code/scripts/sync-workaround-side-effects.sh
    upstream_issues: [anthropics/claude-code#43392, anthropics/claude-code#24317]
    retire_when: upstream issues close + fix verified in production
