<!DOCTYPE html>
<!--
  Touchstone scaffold — starter structure for the Wedge's crystallization heat.

  This is NOT the Touchstone. It is the empty frame the Wedge fills with
  the chosen direction's typography, color, atmosphere, and motion. The
  comments below mark the regions the Wedge MUST populate before
  considering the Touchstone forged.

  HARD RULES (enforced mechanically by the Wedge skill):
    1. Replace BOTH font links with characterful pairings — never Inter/Roboto/Arial/Space Grotesk.
    2. Set --color-dominant and --color-accent to ONE direction's palette — not three equal brand colors.
    3. Replace the placeholder atmospheric background with a real treatment.
    4. Implement the orchestrated page-load motion in --motion-* tokens and CSS animations.
    5. Fill ALL five regions: Atmospheric Backdrop, Hero, Primary Task, Moment of Delight, Token Legend.

  Persisted artifact name: [PROJECT]_03e_Touchstone_V1.0.html
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[PROJECT] — Touchstone</title>

  <!--
    REGION 0: Font import.
    Replace these <link> tags with the chosen direction's pairing.
    Display + body. Real Google Fonts URLs (or self-hosted).
    EXAMPLES of acceptable distinctive choices (do not all use these — vary across projects):
      - PP Editorial New + Söhne
      - Migra + Inter Tight (Inter Tight is the variable cousin, allowed; Inter base is banned)
      - Cormorant Garamond + JetBrains Mono
      - Reckless Neue + Authentic Sans
      - Tiempos Headline + Söhne Buch
      - Whyte + ABC Diatype
      - NM Type families
    BANNED: Inter (regular), Roboto, Arial, Helvetica, Open Sans, Lato, Source Sans, Space Grotesk, default system stacks.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="<!-- WEDGE: replace with display font URL -->">
  <link rel="stylesheet" href="<!-- WEDGE: replace with body font URL -->">

  <style>
    /* =========================================================
       REGION 1: Token legend (CSS variables)
       The Wedge fills these with the chosen direction's values.
       Smith reads these tokens to inherit the aesthetic in MVP screens.
       ========================================================= */
    :root {
      /* Typography */
      --font-display: '<!-- WEDGE: display font name -->', serif;
      --font-body: '<!-- WEDGE: body font name -->', sans-serif;
      --font-mono: '<!-- WEDGE: mono font name -->', monospace;

      /* Type scale (modular, project-tuned) */
      --type-display-xl: clamp(3rem, 10vw, 8rem);
      --type-display-lg: clamp(2.5rem, 6vw, 5rem);
      --type-h1: clamp(2rem, 4vw, 3.5rem);
      --type-h2: 2rem;
      --type-h3: 1.5rem;
      --type-body: 1rem;
      --type-small: 0.875rem;
      --type-micro: 0.75rem;

      /* Color — ONE dominant, ONE accent, no three-equal-brand-colors */
      --color-dominant: <!-- WEDGE: hex -->;
      --color-accent: <!-- WEDGE: hex -->;
      --color-canvas: <!-- WEDGE: hex — page base -->;
      --color-ink: <!-- WEDGE: hex — primary text -->;
      --color-ink-soft: <!-- WEDGE: hex — secondary text -->;
      --color-line: <!-- WEDGE: hex — borders/dividers -->;

      /* Atmospheric layer — gradient mesh, noise, grain */
      --atmosphere-1: <!-- WEDGE: hex or gradient -->;
      --atmosphere-2: <!-- WEDGE: hex or gradient -->;

      /* Spacing (8-point or chosen rhythm) */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 1rem;
      --space-4: 1.5rem;
      --space-5: 2rem;
      --space-6: 3rem;
      --space-7: 5rem;
      --space-8: 8rem;

      /* Radii — match the chosen direction's character */
      --radius-sm: <!-- WEDGE: e.g. 4px or 0 for brutalist -->;
      --radius-md: <!-- WEDGE -->;
      --radius-lg: <!-- WEDGE -->;
      --radius-pill: 999px;

      /* Shadows — depth, never flat */
      --shadow-sm: <!-- WEDGE: subtle layered shadow -->;
      --shadow-md: <!-- WEDGE: -->;
      --shadow-lg: <!-- WEDGE: dramatic depth -->;

      /* Motion tokens */
      --motion-fast: 200ms;
      --motion-medium: 480ms;
      --motion-slow: 1200ms;
      --motion-easing-out: cubic-bezier(0.16, 1, 0.3, 1);
      --motion-easing-in: cubic-bezier(0.7, 0, 0.84, 0);
      --motion-easing-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* =========================================================
       Base reset and body type
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      font-size: var(--type-body);
      line-height: 1.5;
      color: var(--color-ink);
      background: var(--color-canvas);
      min-height: 100vh;
      overflow-x: hidden;
      /* Touchstone must opt into atmospheric backdrop, not flat solid */
    }

    h1, h2, h3 { font-family: var(--font-display); line-height: 1.1; }
    h1 { font-size: var(--type-h1); }
    h2 { font-size: var(--type-h2); }
    h3 { font-size: var(--type-h3); }

    /* =========================================================
       REGION 2: Atmospheric Backdrop
       The Wedge fills this with the chosen direction's air.
       Examples: gradient mesh, layered noise SVG, animated mesh,
       grain overlay, paper texture, subtle parallax stars.
       NEVER leave as flat solid color.
       ========================================================= */
    .atmosphere {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      /* WEDGE: replace with chosen atmospheric treatment.
         Examples:
           background: radial-gradient(at 30% 20%, var(--atmosphere-1), transparent 50%),
                       radial-gradient(at 80% 70%, var(--atmosphere-2), transparent 50%);
           filter: blur(80px);
         Or layered SVG noise, gradient mesh, etc.
      */
    }

    /* =========================================================
       REGION 3: Hero Surface
       First impression. Display type at scale. Dominant in command.
       One orchestrated page-load animation (staggered reveals).
       ========================================================= */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-7) var(--space-5);
      max-width: 1400px;
      margin: 0 auto;
    }

    .hero__eyebrow {
      font-family: var(--font-mono);
      font-size: var(--type-micro);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-ink-soft);
      opacity: 0;
      animation: rise 800ms var(--motion-easing-out) 100ms forwards;
    }

    .hero__title {
      font-size: var(--type-display-xl);
      margin: var(--space-4) 0;
      opacity: 0;
      animation: rise 1000ms var(--motion-easing-out) 300ms forwards;
    }

    .hero__lede {
      max-width: 60ch;
      font-size: 1.25rem;
      color: var(--color-ink-soft);
      opacity: 0;
      animation: rise 800ms var(--motion-easing-out) 600ms forwards;
    }

    .hero__cta {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      margin-top: var(--space-5);
      padding: var(--space-3) var(--space-5);
      background: var(--color-dominant);
      color: var(--color-canvas);
      font-family: var(--font-body);
      font-weight: 600;
      border-radius: var(--radius-md);
      text-decoration: none;
      opacity: 0;
      animation: rise 800ms var(--motion-easing-out) 900ms forwards;
      transition: transform var(--motion-fast) var(--motion-easing-out);
    }

    .hero__cta:hover { transform: translateY(-2px); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* =========================================================
       REGION 4: Primary Task Surface
       The heart of what users do here — drawn from the Vow's
       audience posture. Form / feed / canvas / chat / dashboard.
       The Wedge instantiates with the project's actual primary task.
       ========================================================= */
    .task {
      padding: var(--space-7) var(--space-5);
      max-width: 1400px;
      margin: 0 auto;
    }

    .task__header { margin-bottom: var(--space-5); }

    /* WEDGE: replace .task body with the project's actual primary task UI.
       Examples:
         - Drafting / writing app: text editor surface with toolbar
         - Marketplace: product grid with one focused card
         - Chat / AI: conversation thread with input
         - Dashboard: 2-3 key data widgets
         - Form-driven: a single form filling the surface
    */

    /* =========================================================
       REGION 5: Moment of Delight
       One place where the design surprises. A scroll reveal,
       a custom cursor, a typographic flourish, a motion easter egg,
       a hover state that exceeds expectation. Screenshot-worthy.
       ========================================================= */
    .delight {
      padding: var(--space-7) var(--space-5);
      max-width: 1400px;
      margin: 0 auto;
    }

    /* WEDGE: implement the surprise here. */

    /* =========================================================
       REGION 6: Token Legend (visible footer)
       Smith reads this to inherit the aesthetic in MVP screens.
       Keep it human-readable AND machine-parseable.
       ========================================================= */
    .legend {
      padding: var(--space-7) var(--space-5);
      border-top: 1px solid var(--color-line);
      max-width: 1400px;
      margin: 0 auto;
      font-family: var(--font-mono);
      font-size: var(--type-small);
    }

    .legend__grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: var(--space-4);
      margin-top: var(--space-4);
    }

    .legend__cell { padding: var(--space-3) 0; }
    .legend__cell strong { display: block; font-family: var(--font-body); margin-bottom: var(--space-2); }

    .swatch {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      vertical-align: middle;
      margin-right: var(--space-2);
      border: 1px solid var(--color-line);
    }
  </style>
</head>
<body>

  <!-- REGION 2: Atmosphere -->
  <div class="atmosphere" aria-hidden="true"></div>

  <!-- REGION 3: Hero -->
  <section class="hero">
    <p class="hero__eyebrow"><!-- WEDGE: eyebrow text — category, mood, signal --></p>
    <h1 class="hero__title"><!-- WEDGE: display headline drawn from Vow --></h1>
    <p class="hero__lede"><!-- WEDGE: 1–2 sentence lede grounding the audience posture --></p>
    <a href="#task" class="hero__cta"><!-- WEDGE: primary action label --></a>
  </section>

  <!-- REGION 4: Primary Task -->
  <section class="task" id="task">
    <header class="task__header">
      <h2><!-- WEDGE: task surface heading --></h2>
    </header>
    <!-- WEDGE: the actual primary-task UI -->
  </section>

  <!-- REGION 5: Moment of Delight -->
  <section class="delight">
    <h2><!-- WEDGE: delight heading --></h2>
    <!-- WEDGE: the surprise -->
  </section>

  <!-- REGION 6: Token Legend -->
  <footer class="legend">
    <h3>Touchstone Tokens</h3>
    <p>The aesthetic constitution. Smith inherits these into every MVP screen.</p>
    <div class="legend__grid">
      <div class="legend__cell">
        <strong>Typography</strong>
        Display: <!-- WEDGE: name --><br>
        Body: <!-- WEDGE: name --><br>
        Mono: <!-- WEDGE: name -->
      </div>
      <div class="legend__cell">
        <strong>Color</strong>
        <span class="swatch" style="background: var(--color-dominant);"></span>Dominant<br>
        <span class="swatch" style="background: var(--color-accent);"></span>Accent<br>
        <span class="swatch" style="background: var(--color-canvas);"></span>Canvas<br>
        <span class="swatch" style="background: var(--color-ink);"></span>Ink
      </div>
      <div class="legend__cell">
        <strong>Motion</strong>
        Fast: 200ms<br>
        Medium: 480ms<br>
        Slow: 1200ms<br>
        Easing: <!-- WEDGE: principle one-liner -->
      </div>
      <div class="legend__cell">
        <strong>Direction</strong>
        <!-- WEDGE: chosen direction one-liner -->
      </div>
    </div>
  </footer>

  <script>
    // REGION 7 (optional): JS for orchestrated motion beyond CSS.
    // The Wedge adds scroll-triggered reveals, custom cursors,
    // or motion easter eggs here. Keep it minimal — CSS is the default.
  </script>
</body>
</html>
